schema_version: "1.0"

extension:
  id: code-standard-drift-analysis
  name: "Code Standard Drift Analysis"
  version: "0.1.0"
  description: "Generate coding-standard drift reports and remediation workflows after implementation"
  author: OpenCode
  repository: TODO
  license: MIT

requires:
  speckit_version: ">=0.2.0"

provides:
  commands:
    - name: speckit.code-standard-drift-analysis.report
      file: commands/speckit.code-standard-drift-analysis.report.md
      description: "Generate or refresh code-standard-drift-report.md for the active feature"
    - name: speckit.code-standard-drift-analysis.checklist
      file: commands/speckit.code-standard-drift-analysis.checklist.md
      description: "Generate or extend code-standard-drift-remediation.md from the drift report"
    - name: speckit.code-standard-drift-analysis.remediate
      file: commands/speckit.code-standard-drift-analysis.remediate.md
      description: "Execute unresolved remediation tasks and correct flagged code-standard drift"

hooks:
  after_implement:
    command: speckit.code-standard-drift-analysis.report
    optional: true
    prompt: "Run code-standard drift analysis after implementation?"
    description: "Generate or refresh the coding-standard drift report for the active feature"

tags:
  - "analysis"
  - "standards"
  - "quality"
  - "maintenance"
