schema_version: "1.0"

extension:
  id: data-model-diagram
  name: "Data Model Diagram"
  version: "0.1.0"
  description: "Generate Mermaid ER diagrams from Spec Kit data models after planning"
  author: OpenCode
  repository: https://github.com/benizzio/ghostfolio-cryptogains
  license: GPL-3.0-only

requires:
  speckit_version: ">=0.2.0"

provides:
  commands:
    - name: speckit.data-model-diagram.generate
      file: commands/generate.md
      description: "Generate data-model-diagram.mmd from data-model.md"

hooks:
  after_plan:
    command: speckit.data-model-diagram.generate
    optional: false
    description: "Generate a Mermaid ER diagram from the active feature data model"

tags:
  - "diagram"
  - "documentation"
  - "mermaid"
