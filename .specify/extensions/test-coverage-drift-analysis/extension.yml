schema_version: "1.0"

extension:
  id: test-coverage-drift-analysis
  name: "Test Coverage Drift Analysis"
  version: "0.1.0"
  description: "Generate test-coverage drift reports and Spec Kit remediation task phases after implementation"
  author: OpenCode
  repository: TODO
  license: MIT

requires:
  speckit_version: ">=0.2.0"

provides:
  commands:
    - name: speckit.test-coverage-drift-analysis.report
      file: commands/speckit.test-coverage-drift-analysis.report.md
      description: "Generate or refresh test-coverage-drift-report.md for the active feature"
    - name: speckit.test-coverage-drift-analysis.remediation-plan
      file: commands/speckit.test-coverage-drift-analysis.remediation-plan.md
      description: "Append Spec Kit coverage remediation tasks to tasks.md from the drift report"

hooks:
  after_implement:
    command: speckit.test-coverage-drift-analysis.report
    optional: true
    prompt: "Run test-coverage drift analysis after implementation?"
    description: "Generate or refresh the test-coverage drift report for the active feature"

tags:
  - "analysis"
  - "coverage"
  - "testing"
  - "quality"
  - "maintenance"
