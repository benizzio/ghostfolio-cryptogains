schema_version: "1.0"

extension:
  id: coding-standards-drift-analysis
  name: "Coding Standards Drift Analysis"
  version: "0.2.0"
  description: "Generate coding-standards drift reports and Spec Kit remediation task phases after implementation"
  author: OpenCode
  repository: TODO
  license: MIT

requires:
  speckit_version: ">=0.2.0"

provides:
  commands:
    - name: speckit.coding-standards-drift-analysis.report
      file: commands/speckit.coding-standards-drift-analysis.report.md
      description: "Generate or refresh coding-standards-drift-report.md for the active feature"
    - name: speckit.coding-standards-drift-analysis.remediation-plan
      file: commands/speckit.coding-standards-drift-analysis.remediation-plan.md
      description: "Append Spec Kit remediation tasks to tasks.md from the drift report"

hooks:
  after_implement:
    command: speckit.coding-standards-drift-analysis.report
    optional: true
    prompt: "Run coding-standards drift analysis after implementation?"
    description: "Generate or refresh the coding-standards drift report for the active feature"

tags:
  - "analysis"
  - "standards"
  - "quality"
  - "maintenance"
