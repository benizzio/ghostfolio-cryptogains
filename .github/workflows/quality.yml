# Co-authored by: OpenCode and benizzio
name: Quality

permissions:
  contents: read

env:
  GOCACHE: ${{ github.workspace }}/.cache/go-build
  GOMODCACHE: ${{ github.workspace }}/.cache/go-mod

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches-ignore:
      - main

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        # actions/checkout@v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Cache Go modules and build cache
        # actions/cache@v4
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ${{ env.GOCACHE }}
            ${{ env.GOMODCACHE }}
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Set up Go
        # actions/setup-go@v5
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod

      - name: Resolve quality base ref
        env:
          BASE_REF: ${{ github.base_ref }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ -n "$BASE_REF" ]; then
            printf 'QUALITY_BASE_REF=origin/%s\n' "$BASE_REF" >> "$GITHUB_ENV"
          else
            printf 'QUALITY_BASE_REF=origin/%s\n' "$DEFAULT_BRANCH" >> "$GITHUB_ENV"
          fi

      - name: Run changed-source quality gate
        run: make quality QUALITY_BASE_REF="$QUALITY_BASE_REF"
